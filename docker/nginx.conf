# How many CPU cores to use (auto = let nginx decide based on server)
worker_processes auto;

# How many simultaneous connections each worker can handle
events {
    worker_connections 1024;
}

http {
    # Lets nginx serve correct file types (html, css, js, images, etc.)
    include mime.types;
    
    # If a file type is unknown, treat it as a binary download
    default_type application/octet-stream;
    
    # Speeds up file transfers by using the OS instead of reading then writing
    sendfile on;
    
    # Keeps connections open for 65 seconds (better for mobile apps)
    keepalive_timeout 65;

    server {
        # Listen on whatever port Railway assigns
        listen $PORT;
        
        # Your Laravel public folder is the web root
        root /var/www/public;
        
        # Default file to serve
        index index.php;

        # All requests go through Laravel's index.php (how Laravel routing works)
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Handle PHP files — pass them to php-fpm to execute
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;  # php-fpm listens here
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            
            # Increase timeout for heavy operations (image uploads, etc.)
            fastcgi_read_timeout 300;
        }

        # Deny access to hidden files like .env
        location ~ /\.(?!well-known).* {
            deny all;
        }

        # Allow large image uploads (5 images per item)
        client_max_body_size 20M;
    }
}